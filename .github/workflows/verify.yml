name: Verify finite certificate

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install test dependency
        run: python -m pip install -r requirements-dev.txt

      - name: Verify arbitrary-precision runtime guard
        run: PYTHONPATH=src python scripts/verify_runtime_safety.py

      - name: Run exact finite verifier
        run: PYTHONPATH=src python scripts/verify_challenge_12.py

      - name: Verify checked-in data hashes
        run: PYTHONPATH=src python scripts/verify_data_hashes.py

      - name: Run tests
        run: PYTHONPATH=src python -m pytest -q
